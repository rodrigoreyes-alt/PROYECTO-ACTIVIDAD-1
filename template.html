<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla Base - Dashboard Educativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="globales/styles.css">
</head>
<body>

    <aside id="sidebar" class="sidebar">
        <!-- LOGO SUPERIOR -->
        <a href="#" class="toggle-btn" id="btn-logo" aria-label="Alternar menú">
            <img src="globales/logo.png" alt="Logo" class="logo-img">
        </a>

        <!-- CONTENIDO DEL SIDEBAR (Se oculta al colapsar) -->
        <div class="sidebar-content">
            
            <!-- TEXTO DE INSTRUCCIONES BASE -->
            <div id="seccion-instrucciones">
                <h2 class="sidebar-title">Instrucciones</h2>
                <p class="sidebar-subtitle">Selecciona la lección indicada.</p>
            </div>

            <!-- Aquí podrás agregar más controles, listas o textos según la lección -->

        </div>

        <!-- ÍCONO INFERIOR (Flecha de salida) -->
        <a href="#" class="toggle-btn btn-bottom" id="btn-flecha" aria-label="Alternar menú">
            <i class="fa-solid fa-right-to-bracket"></i>
        </a>
    </aside>

    <main class="main-content">
        <div class="content-box">
            <!-- Aquí insertarás el contenido principal (videos, texto, juegos, etc.) -->
        </div>
    </main>

    <script src="globales/scripts.js"></script>
</body>
</html>
